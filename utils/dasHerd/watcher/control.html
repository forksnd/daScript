<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>dasHerd watcher terminal</title>
  <style>
    :root { color-scheme: dark; font-size: 150%; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { background: #11151b; color: #e8edf2; font: .72rem/1.35 system-ui, sans-serif; overflow: hidden; }
    button, input { font: inherit; color: inherit; background: #202832; border: 1px solid #465567; border-radius: .25rem; padding: .35rem .5rem; }
    button { cursor: pointer; }
    button:hover { background: #2b3745; }
    .app { height: 100%; display: grid; grid-template-columns: minmax(12rem, 24%) 1fr; grid-template-rows: minmax(0, 1fr) auto; }
    aside { border-right: 1px solid #394655; min-width: 0; overflow: auto; padding: .6rem; }
    main { min-width: 0; min-height: 0; display: flex; flex-direction: column; }
    h1 { font-size: .95rem; margin: 0 0 .6rem; }
    .launch { display: grid; gap: .35rem; margin-bottom: .7rem; }
    .sessions { display: grid; gap: .3rem; }
    .session { width: 100%; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session.selected { outline: 2px solid #65a8ff; }
    .toolbar { display: flex; flex-wrap: wrap; gap: .35rem; align-items: center; padding: .45rem; border-bottom: 1px solid #394655; }
    .command { padding: .45rem .65rem; color: #91c6ff; background: #171d25; border-bottom: 1px solid #303b48; overflow-wrap: anywhere; }
    .terminal-host { flex: 1; min-height: 0; padding: .35rem; background: #080b0f; }
    #terminal { width: 100%; height: 100%; }
    footer { grid-column: 1 / -1; display: flex; gap: .4rem; align-items: center; padding: .35rem .55rem; border-top: 1px solid #394655; background: #171d25; }
    .grow { flex: 1; }
    .muted { color: #9aa8b7; }
    .error { color: #ff8e87; }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1>dasHerd watcher</h1>
      <div class="launch">
        <input id="command" value="powershell.exe -NoLogo" aria-label="Command line">
        <input id="cwd" placeholder="working directory (optional)" aria-label="Working directory">
        <button id="launch">Launch terminal</button>
      </div>
      <div id="sessions" class="sessions"></div>
    </aside>
    <main>
      <div class="toolbar">
        <button id="refresh">Refresh</button>
        <button id="attach">Attach + control</button>
        <button id="observe">Observe</button>
        <button id="detach">Detach</button>
        <button id="terminate">Terminate</button>
        <span id="state" class="muted">No session selected</span>
      </div>
      <div id="commandHeader" class="command">$</div>
      <div class="terminal-host"><div id="terminal" aria-label="Interactive terminal"></div></div>
    </main>
    <footer>
      <span id="connection" class="muted">Loading terminal...</span>
      <span class="grow"></span>
      <button id="zoomOut">-5%</button>
      <button id="zoomReset">Reset</button>
      <button id="zoomIn">+5%</button>
      <span id="zoom">150%</span>
    </footer>
  </div>
  <script>
    const $ = id => document.getElementById(id);
    const token = new URLSearchParams(location.search).get('token') || '';
    const withToken = path => `${path}?token=${encodeURIComponent(token)}`;
    let sessions = [];
    let selected = '';
    let attached = '';
    let controls = false;
    let ws;
    let terminal;
    let fitAddon;
    let zoom = 150;
    let resizeTimer;

    function loadStyle(path) {
      return new Promise((resolve, reject) => {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = withToken(path);
        link.onload = resolve;
        link.onerror = reject;
        document.head.appendChild(link);
      });
    }

    function loadScript(path) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = withToken(path);
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    function showError(error) {
      $('connection').textContent = String(error.message || error);
      $('connection').className = 'error';
    }

    function sendWs(message) {
      if (!ws || ws.readyState !== WebSocket.OPEN) throw new Error('WebSocket is not connected');
      ws.send(JSON.stringify(message));
    }

    function fitAndResize() {
      if (!fitAddon || !terminal) return;
      fitAddon.fit();
      if (attached && controls && ws?.readyState === WebSocket.OPEN) {
        sendWs({op: 'resize', columns: terminal.cols, rows: terminal.rows});
      }
    }

    function scheduleFit() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(fitAndResize, 50);
    }

    function setZoom(value) {
      zoom = Math.max(50, Math.min(300, Math.round(value / 5) * 5));
      document.documentElement.style.fontSize = `${zoom}%`;
      $('zoom').textContent = `${zoom}%`;
      localStorage.setItem('dasherd-watcher-zoom', zoom);
      if (terminal) terminal.options.fontSize = Math.max(8, Math.round(14 * zoom / 100));
      scheduleFit();
    }

    async function request(path, options = {}) {
      const response = await fetch(withToken(path), {
        ...options,
        headers: {'content-type': 'application/json', ...(options.headers || {})}
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
      return data;
    }

    function renderSessions() {
      $('sessions').replaceChildren(...sessions.map(session => {
        const button = document.createElement('button');
        button.className = `session${session.id === selected ? ' selected' : ''}`;
        button.textContent = `${session.id} - ${session.state} - ${session.command_line}`;
        button.title = session.command_line;
        button.onclick = () => { selected = session.id; renderSessions(); attach(true); };
        return button;
      }));
    }

    async function refreshSessions() {
      sessions = await request('/api/v1/sessions');
      if (selected && !sessions.some(s => s.id === selected)) selected = '';
      renderSessions();
    }

    function attach(control) {
      if (!selected) return;
      sendWs({op: 'attach', session_id: selected, control, raw: true});
    }

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}/ws?token=${encodeURIComponent(token)}`);
      ws.binaryType = 'arraybuffer';
      ws.onopen = () => {
        $('connection').textContent = 'Connected';
        $('connection').className = 'muted';
        refreshSessions().catch(showError);
      };
      ws.onclose = () => {
        controls = false;
        if (terminal) terminal.options.disableStdin = true;
        $('connection').textContent = 'Disconnected; reconnecting...';
        setTimeout(connect, 1000);
      };
      ws.onerror = showError;
      ws.onmessage = event => {
        if (event.data instanceof ArrayBuffer) {
          terminal.write(new Uint8Array(event.data));
          return;
        }
        const message = JSON.parse(event.data);
        if (message.type === 'error') showError(new Error(message.error));
        if (message.type === 'attached') {
          attached = message.session_id;
          controls = message.controls;
          terminal.reset();
          terminal.options.disableStdin = !controls;
          $('connection').textContent = controls ? 'Connected - controller' : 'Connected - observing';
          $('connection').className = 'muted';
          scheduleFit();
          if (controls) terminal.focus();
        }
        if (message.type === 'raw_reset') terminal.reset();
        if (message.type === 'detached') {
          attached = '';
          controls = false;
          terminal.options.disableStdin = true;
        }
        if (message.type === 'snapshot') {
          const data = message.data;
          $('commandHeader').textContent = `$ ${data.session.command_line}`;
          $('state').textContent = `${data.session.state} - pid ${data.session.pid} - ${data.session.output_bytes} bytes`;
          const index = sessions.findIndex(s => s.id === data.session.id);
          if (index >= 0) sessions[index] = data.session; else sessions.push(data.session);
          renderSessions();
        }
      };
    }

    async function boot() {
      await loadStyle('/vendor/xterm.css');
      await loadScript('/vendor/xterm.js');
      await loadScript('/vendor/addon-fit.js');
      await loadScript('/vendor/addon-unicode11.js');
      await loadScript('/vendor/addon-web-links.js');

      terminal = new Terminal({
        allowProposedApi: true,
        convertEol: false,
        cursorBlink: true,
        cursorStyle: 'block',
        fontFamily: '"Cascadia Mono", Consolas, monospace',
        fontSize: 21,
        scrollback: 10000,
        theme: {background: '#080b0f', foreground: '#e8edf2', cursor: '#f4f7fa', selectionBackground: '#315b86aa'}
      });
      fitAddon = new FitAddon.FitAddon();
      terminal.loadAddon(fitAddon);
      terminal.loadAddon(new Unicode11Addon.Unicode11Addon());
      terminal.unicode.activeVersion = '11';
      terminal.loadAddon(new WebLinksAddon.WebLinksAddon((event, uri) => {
        let url;
        try { url = new URL(uri); } catch { return; }
        if (url.protocol !== 'http:' && url.protocol !== 'https:') return;
        window.open(url.href, '_blank', 'noopener,noreferrer');
      }));
      terminal.open($('terminal'));
      terminal.options.disableStdin = true;
      terminal.onData(data => {
        if (attached && controls) sendWs({op: 'input', text: data});
      });
      terminal.onBinary(data => {
        if (attached && controls) sendWs({op: 'input', text: data});
      });
      new ResizeObserver(scheduleFit).observe(document.querySelector('.terminal-host'));

      setZoom(Number(localStorage.getItem('dasherd-watcher-zoom') || 150));
      $('launch').onclick = async () => {
        try {
          fitAndResize();
          const result = await request('/api/v1/sessions', {method: 'POST', body: JSON.stringify({
            command_line: $('command').value, cwd: $('cwd').value,
            columns: terminal.cols, rows: terminal.rows, timeout_ms: 0
          })});
          selected = result.session_id;
          await refreshSessions();
          attach(true);
        } catch (error) { showError(error); }
      };
      $('refresh').onclick = () => refreshSessions().catch(showError);
      $('attach').onclick = () => attach(true);
      $('observe').onclick = () => attach(false);
      $('detach').onclick = () => { if (attached) sendWs({op: 'detach'}); };
      $('terminate').onclick = async () => {
        if (!selected || !confirm(`Terminate ${selected}?`)) return;
        try { await request('/api/v1/terminate', {method: 'POST', body: JSON.stringify({session_id: selected})}); }
        catch (error) { showError(error); }
      };
      $('zoomOut').onclick = () => setZoom(zoom - 5);
      $('zoomIn').onclick = () => setZoom(zoom + 5);
      $('zoomReset').onclick = () => setZoom(150);
      setInterval(() => { if (ws?.readyState === WebSocket.OPEN) sendWs({op: 'heartbeat'}); }, 2000);
      setInterval(() => refreshSessions().catch(showError), 2000);
      connect();
    }

    boot().catch(showError);
  </script>
</body>
</html>
