<svg xmlns="http://www.w3.org/2000/svg" width="860" height="470" viewBox="0 0 860 470" font-family="'JetBrains Mono','Cascadia Mono','Consolas',monospace">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b5547"/>
    </marker>
    <marker id="arA" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a87420"/>
    </marker>
  </defs>
  <rect width="860" height="470" fill="#0d0c0a"/>

  <!-- token timeline -->
  <rect x="48" y="44" width="64" height="32" rx="6" fill="#15130f" stroke="#6aa9c4"/>
  <text x="80" y="64" text-anchor="middle" font-size="11.5" fill="#5b5547">&#60;s&#62;</text>
  <rect x="118" y="44" width="64" height="32" rx="6" fill="#15130f" stroke="#6aa9c4"/>
  <text x="150" y="64" text-anchor="middle" font-size="11.5" fill="#e8e2d2">Once</text>
  <rect x="188" y="44" width="64" height="32" rx="6" fill="#15130f" stroke="#6aa9c4"/>
  <text x="220" y="64" text-anchor="middle" font-size="11.5" fill="#e8e2d2">upon</text>
  <rect x="258" y="44" width="64" height="32" rx="6" fill="#15130f" stroke="#6aa9c4"/>
  <text x="290" y="64" text-anchor="middle" font-size="11.5" fill="#e8e2d2">a</text>
  <rect x="328" y="44" width="64" height="32" rx="6" fill="#15130f" stroke="#6aa9c4"/>
  <text x="360" y="64" text-anchor="middle" font-size="11.5" fill="#e8e2d2">time</text>
  <rect x="398" y="44" width="64" height="32" rx="6" fill="#15130f" stroke="#a87420"/>
  <text x="430" y="64" text-anchor="middle" font-size="11.5" fill="#e8a13a">,</text>
  <rect x="468" y="44" width="64" height="32" rx="6" fill="#15130f" stroke="#a87420"/>
  <text x="500" y="64" text-anchor="middle" font-size="11.5" fill="#e8a13a">there</text>
  <rect x="538" y="44" width="64" height="32" rx="6" fill="#15130f" stroke="#a87420"/>
  <text x="570" y="64" text-anchor="middle" font-size="11.5" fill="#e8a13a">was</text>
  <rect x="608" y="44" width="64" height="32" rx="6" fill="#15130f" stroke="#a87420"/>
  <text x="640" y="64" text-anchor="middle" font-size="11.5" fill="#e8a13a">a</text>
  <rect x="678" y="44" width="64" height="32" rx="6" fill="#15130f" stroke="#a87420"/>
  <text x="710" y="64" text-anchor="middle" font-size="11.5" fill="#e8a13a">little</text>
  <rect x="748" y="44" width="64" height="32" rx="6" fill="none" stroke="#5b5547" stroke-dasharray="4 3"/>
  <text x="780" y="64" text-anchor="middle" font-size="11.5" fill="#5b5547">?</text>

  <!-- position numbers -->
  <text x="80" y="92" text-anchor="middle" font-size="10" fill="#5b5547">0</text>
  <text x="150" y="92" text-anchor="middle" font-size="10" fill="#5b5547">1</text>
  <text x="220" y="92" text-anchor="middle" font-size="10" fill="#5b5547">2</text>
  <text x="290" y="92" text-anchor="middle" font-size="10" fill="#5b5547">3</text>
  <text x="360" y="92" text-anchor="middle" font-size="10" fill="#5b5547">4</text>
  <text x="430" y="92" text-anchor="middle" font-size="10" fill="#5b5547">5</text>
  <text x="500" y="92" text-anchor="middle" font-size="10" fill="#5b5547">6</text>
  <text x="570" y="92" text-anchor="middle" font-size="10" fill="#5b5547">7</text>
  <text x="640" y="92" text-anchor="middle" font-size="10" fill="#5b5547">8</text>
  <text x="710" y="92" text-anchor="middle" font-size="10" fill="#5b5547">9</text>

  <!-- spans -->
  <line x1="48" y1="106" x2="392" y2="106" stroke="#6aa9c4" stroke-width="1.2"/>
  <line x1="48" y1="102" x2="48" y2="110" stroke="#6aa9c4" stroke-width="1.2"/>
  <line x1="392" y1="102" x2="392" y2="110" stroke="#6aa9c4" stroke-width="1.2"/>
  <text x="220" y="124" text-anchor="middle" font-size="11" fill="#6aa9c4">prefill &#8212; one forward() per prompt token</text>
  <line x1="398" y1="106" x2="742" y2="106" stroke="#a87420" stroke-width="1.2"/>
  <line x1="398" y1="102" x2="398" y2="110" stroke="#a87420" stroke-width="1.2"/>
  <line x1="742" y1="102" x2="742" y2="110" stroke="#a87420" stroke-width="1.2"/>
  <text x="570" y="124" text-anchor="middle" font-size="11" fill="#e8a13a">generation &#8212; output becomes input</text>

  <!-- the loop -->
  <rect x="130" y="196" width="240" height="44" rx="8" fill="#15130f" stroke="#2a2620"/>
  <text x="250" y="223" text-anchor="middle" font-size="12.5" fill="#e8e2d2">forward(token, position)</text>
  <line x1="370" y1="218" x2="426" y2="218" stroke="#5b5547" stroke-width="1.3" marker-end="url(#ar)"/>
  <rect x="430" y="196" width="150" height="44" rx="8" fill="#15130f" stroke="#2a2620"/>
  <text x="505" y="223" text-anchor="middle" font-size="12.5" fill="#e8e2d2">32,000 logits</text>
  <line x1="580" y1="218" x2="636" y2="218" stroke="#5b5547" stroke-width="1.3" marker-end="url(#ar)"/>
  <rect x="640" y="196" width="180" height="44" rx="8" fill="#15130f" stroke="#2a2620"/>
  <text x="730" y="216" text-anchor="middle" font-size="12.5" fill="#e8e2d2">most_likely()</text>
  <text x="730" y="232" text-anchor="middle" font-size="10" fill="#9b9281">pick the largest</text>
  <path d="M 730,240 L 730,296 Q 730,304 722,304 L 258,304 Q 250,304 250,296 L 250,244" fill="none" stroke="#a87420" stroke-width="1.4" marker-end="url(#arA)"/>
  <text x="490" y="322" text-anchor="middle" font-size="11" fill="#e8a13a">the chosen token is the next input &#8212; position + 1</text>
  <path d="M 730,196 L 730,150 Q 730,142 738,142 L 770,142 Q 778,142 778,134 L 778,82" fill="none" stroke="#a87420" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arA)"/>

  <!-- KV cache growth -->
  <text x="48" y="356" font-size="11" fill="#9b9281">KV cache &#8212; one column of keys and values per position, in every layer</text>
  <g fill="#1d3440">
    <rect x="48" y="366" width="64" height="13"/><rect x="48" y="381" width="64" height="13"/><rect x="48" y="396" width="64" height="13"/><rect x="48" y="411" width="64" height="13"/><rect x="48" y="426" width="64" height="13"/><rect x="48" y="441" width="64" height="13"/>
    <rect x="118" y="366" width="64" height="13"/><rect x="118" y="381" width="64" height="13"/><rect x="118" y="396" width="64" height="13"/><rect x="118" y="411" width="64" height="13"/><rect x="118" y="426" width="64" height="13"/><rect x="118" y="441" width="64" height="13"/>
    <rect x="188" y="366" width="64" height="13"/><rect x="188" y="381" width="64" height="13"/><rect x="188" y="396" width="64" height="13"/><rect x="188" y="411" width="64" height="13"/><rect x="188" y="426" width="64" height="13"/><rect x="188" y="441" width="64" height="13"/>
    <rect x="258" y="366" width="64" height="13"/><rect x="258" y="381" width="64" height="13"/><rect x="258" y="396" width="64" height="13"/><rect x="258" y="411" width="64" height="13"/><rect x="258" y="426" width="64" height="13"/><rect x="258" y="441" width="64" height="13"/>
    <rect x="328" y="366" width="64" height="13"/><rect x="328" y="381" width="64" height="13"/><rect x="328" y="396" width="64" height="13"/><rect x="328" y="411" width="64" height="13"/><rect x="328" y="426" width="64" height="13"/><rect x="328" y="441" width="64" height="13"/>
  </g>
  <g fill="#57431f">
    <rect x="398" y="366" width="64" height="13"/><rect x="398" y="381" width="64" height="13"/><rect x="398" y="396" width="64" height="13"/><rect x="398" y="411" width="64" height="13"/><rect x="398" y="426" width="64" height="13"/><rect x="398" y="441" width="64" height="13"/>
    <rect x="468" y="366" width="64" height="13"/><rect x="468" y="381" width="64" height="13"/><rect x="468" y="396" width="64" height="13"/><rect x="468" y="411" width="64" height="13"/><rect x="468" y="426" width="64" height="13"/><rect x="468" y="441" width="64" height="13"/>
    <rect x="538" y="366" width="64" height="13"/><rect x="538" y="381" width="64" height="13"/><rect x="538" y="396" width="64" height="13"/><rect x="538" y="411" width="64" height="13"/><rect x="538" y="426" width="64" height="13"/><rect x="538" y="441" width="64" height="13"/>
    <rect x="608" y="366" width="64" height="13"/><rect x="608" y="381" width="64" height="13"/><rect x="608" y="396" width="64" height="13"/><rect x="608" y="411" width="64" height="13"/><rect x="608" y="426" width="64" height="13"/><rect x="608" y="441" width="64" height="13"/>
    <rect x="678" y="366" width="64" height="13"/><rect x="678" y="381" width="64" height="13"/><rect x="678" y="396" width="64" height="13"/><rect x="678" y="411" width="64" height="13"/><rect x="678" y="426" width="64" height="13"/><rect x="678" y="441" width="64" height="13"/>
  </g>
  <rect x="748" y="366" width="64" height="88" fill="none" stroke="#2a2620" stroke-dasharray="4 3"/>
  <text x="830" y="410" text-anchor="middle" font-size="10" fill="#5b5547" transform="rotate(-90 830 410)">6 layers</text>
</svg>
