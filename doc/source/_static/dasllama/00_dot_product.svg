<svg xmlns="http://www.w3.org/2000/svg" width="860" height="240" viewBox="0 0 860 240" font-family="'JetBrains Mono','Cascadia Mono','Consolas',monospace">
  <defs>
    <marker id="arA" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e8a13a"/>
    </marker>
    <marker id="arB" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6aa9c4"/>
    </marker>
  </defs>
  <rect width="860" height="240" fill="#0d0c0a"/>

  <text x="430" y="40" text-anchor="middle" font-size="12.5" fill="#c1baa9">dot(a, b) = a[0]&#183;b[0] + a[1]&#183;b[1] + &#8230; + a[287]&#183;b[287]</text>
  <text x="430" y="60" text-anchor="middle" font-size="10.5" fill="#9b9281">one number measuring how much two vectors agree</text>

  <!-- panel 1: aligned -->
  <circle cx="170" cy="170" r="2.5" fill="#5b5547"/>
  <line x1="170" y1="170" x2="258" y2="120" stroke="#e8a13a" stroke-width="2" stroke-linecap="round" marker-end="url(#arA)"/>
  <line x1="170" y1="170" x2="240" y2="148" stroke="#6aa9c4" stroke-width="2" stroke-linecap="round" marker-end="url(#arB)"/>
  <text x="268" y="118" font-size="11" fill="#e8a13a">a</text>
  <text x="252" y="154" font-size="11" fill="#6aa9c4">b</text>
  <text x="205" y="206" text-anchor="middle" font-size="11" fill="#c1baa9">aligned</text>
  <text x="205" y="224" text-anchor="middle" font-size="11.5" fill="#e8a13a">a&#183;b &#8811; 0</text>

  <!-- panel 2: unrelated (perpendicular) -->
  <circle cx="430" cy="170" r="2.5" fill="#5b5547"/>
  <line x1="430" y1="170" x2="515" y2="125" stroke="#e8a13a" stroke-width="2" stroke-linecap="round" marker-end="url(#arA)"/>
  <line x1="430" y1="170" x2="385" y2="85" stroke="#6aa9c4" stroke-width="2" stroke-linecap="round" marker-end="url(#arB)"/>
  <text x="525" y="123" font-size="11" fill="#e8a13a">a</text>
  <text x="373" y="82" font-size="11" fill="#6aa9c4">b</text>
  <text x="455" y="206" text-anchor="middle" font-size="11" fill="#c1baa9">unrelated</text>
  <text x="455" y="224" text-anchor="middle" font-size="11.5" fill="#9b9281">a&#183;b &#8776; 0</text>

  <!-- panel 3: opposed -->
  <circle cx="690" cy="170" r="2.5" fill="#5b5547"/>
  <line x1="690" y1="170" x2="775" y2="125" stroke="#e8a13a" stroke-width="2" stroke-linecap="round" marker-end="url(#arA)"/>
  <line x1="690" y1="170" x2="615" y2="205" stroke="#6aa9c4" stroke-width="2" stroke-linecap="round" marker-end="url(#arB)"/>
  <text x="785" y="123" font-size="11" fill="#e8a13a">a</text>
  <text x="600" y="212" font-size="11" fill="#6aa9c4">b</text>
  <text x="740" y="206" text-anchor="middle" font-size="11" fill="#c1baa9">opposed</text>
  <text x="740" y="224" text-anchor="middle" font-size="11.5" fill="#d96d4f">a&#183;b &#60; 0</text>
</svg>
