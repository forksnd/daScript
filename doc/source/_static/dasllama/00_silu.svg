<svg xmlns="http://www.w3.org/2000/svg" width="860" height="330" viewBox="0 0 860 330" font-family="'JetBrains Mono','Cascadia Mono','Consolas',monospace">
  <rect width="860" height="330" fill="#0d0c0a"/>

  <text x="110" y="50" font-size="12.5" fill="#c1baa9">silu(x) = x &#183; sigmoid(x)</text>
  <text x="110" y="72" font-size="10" fill="#9b9281">sigmoid slides from 0 to 1 &#8212; a soft switch</text>

  <!-- axes -->
  <line x1="100" y1="240" x2="780" y2="240" stroke="#2a2620"/>
  <line x1="440" y1="30" x2="440" y2="280" stroke="#2a2620"/>
  <line x1="220" y1="240" x2="220" y2="245" stroke="#5b5547"/>
  <line x1="330" y1="240" x2="330" y2="245" stroke="#5b5547"/>
  <line x1="550" y1="240" x2="550" y2="245" stroke="#5b5547"/>
  <line x1="660" y1="240" x2="660" y2="245" stroke="#5b5547"/>
  <line x1="770" y1="240" x2="770" y2="245" stroke="#5b5547"/>
  <text x="220" y="258" text-anchor="middle" font-size="10" fill="#5b5547">-4</text>
  <text x="330" y="258" text-anchor="middle" font-size="10" fill="#5b5547">-2</text>
  <text x="433" y="258" text-anchor="end" font-size="10" fill="#5b5547">0</text>
  <text x="550" y="258" text-anchor="middle" font-size="10" fill="#5b5547">2</text>
  <text x="660" y="258" text-anchor="middle" font-size="10" fill="#5b5547">4</text>
  <text x="770" y="258" text-anchor="middle" font-size="10" fill="#5b5547">6</text>
  <line x1="434" y1="174" x2="440" y2="174" stroke="#5b5547"/>
  <line x1="434" y1="108" x2="440" y2="108" stroke="#5b5547"/>
  <line x1="434" y1="42" x2="440" y2="42" stroke="#5b5547"/>
  <text x="426" y="178" text-anchor="end" font-size="10" fill="#5b5547">2</text>
  <text x="426" y="112" text-anchor="end" font-size="10" fill="#5b5547">4</text>
  <text x="426" y="46" text-anchor="end" font-size="10" fill="#5b5547">6</text>

  <!-- the curve -->
  <polyline fill="none" stroke="#e8a13a" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" points="110,240.5 165,241.1 220,242.4 275,244.7 302.5,246.2 330,247.9 357.5,249 385,248.9 412.5,246.2 440,240 467.5,229.7 495,215.9 522.5,199.5 550,181.9 577.5,163.7 605,145.7 632.5,129.3 660,110.4 687.5,93.1 715,76.1 742.5,59.2 770,42.5"/>

  <!-- annotations -->
  <text x="225" y="205" text-anchor="middle" font-size="10.5" fill="#9b9281">x &#60; 0: the gate closes &#8212; output &#8776; 0</text>
  <line x1="270" y1="212" x2="310" y2="243" stroke="#5b5547" stroke-width="0.8"/>
  <text x="600" y="185" font-size="10.5" fill="#9b9281">x &#62; 0: the gate opens &#8212; output &#8776; x</text>
</svg>
